app = "kiyap"
primary_region = "nrt"   # Tokyo (한국과 가장 가까운 리전)

[build]
  dockerfile = "Dockerfile"


[env]
  PORT     = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[[http_service.checks]]
  grace_period = "10s"
  interval     = "30s"
  method       = "GET"
  path         = "/login"
  timeout      = "5s"
